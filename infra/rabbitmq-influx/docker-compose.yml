version: '3.9'
services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: telemetry-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: telemetry
      RABBITMQ_DEFAULT_PASS: telemetry123

  influxdb:
    image: influxdb:2.7
    container_name: telemetry-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: admin12345
      DOCKER_INFLUXDB_INIT_ORG: telemetry-org
      DOCKER_INFLUXDB_INIT_BUCKET: telemetry-bucket
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: telemetry-token-change-me

volumes:
  influxdb_data:
  influxdb_config:
